remote_theme: "mmistakes/minimal-mistakes@4.28.0"

plugins:
  - jekyll-remote-theme

locale: "en-US"
title: "Sean Kinsell"
name: "Sean Kinsell"
description: "Technical Program Manager | Systems, Data, Globalization"
url: "https://srkinsell.github.io"
baseurl: ""

minimal_mistakes_skin: "contrast"

markdown: kramdown
permalink: /:categories/:title/

collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
